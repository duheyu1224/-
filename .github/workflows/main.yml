name: Auto Weekly Report

# 触发条件：每周五晚上 18:00 执行
on:
  schedule:
    - cron: '0 18 * * 5' # Cron 表达式
  workflow_dispatch: # 允许你手动点击按钮触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Report Generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }} # 必须在 GitHub 仓库设置中配置
        run: |
          python scripts/generate_weekly.py # 你的生成周报脚本
          
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add weekly_reports/
          git commit -m "docs: auto update weekly report"
          git push
